[weights]
; 四层规则权重配置，总和应为1.0
fact = 0.40
brand = 0.25
compliance = 0.25
norm = 0.10

[monte_carlo]
; 蒙特卡洛模拟参数
n_simulations = 10000
perturbation_sigma = 0.15
random_seed = 42

[thresholds]
; 决策阈值
pass_threshold = 0.8
review_threshold = 0.6

[paths]
; 数据文件路径
facts_db = config/facts_db.json
synonyms_db = config/synonyms_db.json
output_dir = output